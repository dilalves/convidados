<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/x-icon" href="https://www.curso-objetivo.br/assets/img/favicon.ico">
<title>Curso Objetivo – Eventos e Coberturas</title>
<style>
:root{--bg:#f7f8fb;--card:#fff;--line:#e5e7eb;--ink:#0f172a;--muted:#64748b;--primary:#0b3b78;--accent:#2563eb;--soft:#eef4fb;--danger:#b91c1c}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden}
.topbar{height:68px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 24px;box-shadow:0 2px 10px rgba(16,24,40,.16)}
.brand{display:flex;align-items:center;gap:14px;font-weight:800}.brand img{height:32px}.brand span{font-size:18px}.userbox{display:flex;align-items:center;gap:12px;font-size:14px}.btnSair{border:0;border-radius:10px;padding:9px 14px;background:#fde8e8;color:#8b2c2c;font-weight:800;cursor:pointer}
.shell{height:calc(100vh - 68px);display:grid;grid-template-columns:270px 1fr;gap:0}
.sidebar{background:#fff;border-right:1px solid var(--line);padding:18px 14px;overflow:auto}.welcome{background:var(--soft);border:1px solid #dbe6f3;border-radius:14px;padding:14px;margin-bottom:14px}.welcome b{color:var(--primary);display:block;margin-bottom:4px}.welcome small{color:var(--muted)}
.menu{display:flex;flex-direction:column;gap:8px}.menu button{border:0;border-radius:12px;background:#fff;color:#12345b;text-align:left;padding:12px 14px;font-weight:850;cursor:pointer;border:1px solid transparent}.menu button:hover,.menu button.active{background:var(--soft);border-color:#dbe6f3}.menu button span{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
.content{padding:16px;min-width:0;height:100%;overflow:hidden}.framebox{height:100%;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 24px rgba(11,59,120,.06);overflow:hidden}iframe{width:100%;height:100%;border:0;background:#fff}
@media(max-width:900px){body{overflow:auto;height:auto}.shell{height:auto;display:block}.sidebar{border-right:0;border-bottom:1px solid var(--line)}.content{height:calc(100vh - 260px);min-height:520px}.topbar{padding:0 14px}.brand span{font-size:15px}.userbox{font-size:12px}}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><img src="logo-mini.png" alt="Curso Objetivo"><span>Portal dos Convidados</span></div>
  <div class="userbox"><span id="usuarioTopo">Carregando...</span><button class="btnSair" onclick="sair()">Sair</button></div>
</header>
<div class="shell">
  <aside class="sidebar">
    <div class="welcome"><b id="nomeUsuario">Bem-vindo(a)</b><small id="dadosUsuario">Curso Objetivo – Eventos e Coberturas</small></div>
    <nav class="menu">
      <button class="active" data-page="portal_inicio.html" onclick="abrirPagina(this)">Início<span>Resumo do portal</span></button>
      <button data-page="historico_pagamentos.html" onclick="abrirPagina(this)">Histórico de Pagamentos<span>Eventos, funções e valores</span></button>
      <button data-page="recibos.html" onclick="abrirPagina(this)">Recibos<span>Pagamentos fora do holerite</span></button>
      <button data-page="informe_rendimentos.html" onclick="abrirPagina(this)">Informe de Rendimentos<span>Disponível em breve</span></button>
      <button data-page="meus_dados.html" onclick="abrirPagina(this)">Meus Dados<span>Conferência cadastral</span></button>
    </nav>
  </aside>
  <main class="content"><div class="framebox"><iframe id="frame" src="portal_inicio.html" title="Conteúdo do portal"></iframe></div></main>
</div>
<script>
const API_BASE='https://apisec.secauxiliar.com.br/prestadores/';
function abrirPagina(btn){document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('frame').src=btn.dataset.page;}
async function carregarUsuario(){
  try{
    const r=await fetch(API_BASE+'me.php',{credentials:'include',cache:'no-store'});
    const j=await r.json();
    if(!r.ok || !j.ok){ location.href='index.html'; return; }
    const p=j.prestador||{};
    document.getElementById('usuarioTopo').textContent=(p.nome||'Convidado');
    document.getElementById('nomeUsuario').textContent=p.nome||'Bem-vindo(a)';
    const dados=[]; if(p.funcional) dados.push('Funcional '+p.funcional); if(p.cpf) dados.push('CPF '+p.cpf); if(p.tipo_prestador) dados.push(p.tipo_prestador);
    document.getElementById('dadosUsuario').textContent=dados.join(' • ')||'Portal de pagamentos e recibos';
  }catch(e){ location.href='index.html'; }
}
async function sair(){
  try{ await fetch(API_BASE+'logout.php',{method:'POST',credentials:'include'}); }catch(e){}
  location.href='index.html';
}
carregarUsuario();
</script>
</body>
</html>
