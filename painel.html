<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" type="image/x-icon" href="https://www.curso-objetivo.br/assets/img/favicon.ico">

<title>Curso Objetivo – Eventos e Coberturas</title>

<style>
:root{
  --bg:#f7f8fb;
  --card:#fff;
  --line:#e5e7eb;
  --ink:#0f172a;
  --muted:#64748b;
  --primary:#0b3b78;
  --accent:#2563eb;
  --soft:#eef4fb;
  --danger:#b91c1c;
}

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  width:100%;
  height:100%;
}

body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
  height:100vh;
  overflow:hidden;
}

/* =========================================================
   CABEÇALHO
========================================================= */

.topbar{
  height:68px;
  background:var(--primary);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  box-shadow:0 2px 10px rgba(16,24,40,.16);
  position:relative;
  z-index:30;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
  font-weight:800;
  min-width:0;
}

.brand img{
  height:32px;
  width:auto;
  flex-shrink:0;
}

.brand span{
  font-size:18px;
  white-space:nowrap;
}

.userbox{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:12px;
  font-size:14px;
  min-width:0;
}

#usuarioTopo{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.btnSair{
  border:0;
  border-radius:10px;
  padding:9px 14px;
  background:#fde8e8;
  color:#8b2c2c;
  font-weight:800;
  cursor:pointer;
  flex-shrink:0;
}

/* =========================================================
   ESTRUTURA DESKTOP
========================================================= */

.shell{
  height:calc(100vh - 68px);
  display:grid;
  grid-template-columns:270px 1fr;
  gap:0;
}

.sidebar{
  background:#fff;
  border-right:1px solid var(--line);
  padding:18px 14px;
  overflow:auto;
}

.welcome{
  background:var(--soft);
  border:1px solid #dbe6f3;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
}

.welcome b{
  color:var(--primary);
  display:block;
  margin-bottom:4px;
}

.welcome small{
  color:var(--muted);
}

.menu{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.menu button{
  border:1px solid transparent;
  border-radius:12px;
  background:#fff;
  color:#12345b;
  text-align:left;
  padding:12px 14px;
  font-weight:850;
  cursor:pointer;
}

.menu button:hover,
.menu button.active{
  background:var(--soft);
  border-color:#dbe6f3;
}

.menu button span{
  display:block;
  font-size:12px;
  color:var(--muted);
  font-weight:600;
  margin-top:2px;
}

.novoBadge{
  display:inline-flex!important;
  width:auto!important;
  margin-left:8px;
  padding:2px 7px;
  border-radius:999px;
  background:#dcfce7;
  color:#166534!important;
  font-size:10px!important;
  font-weight:900!important;
  vertical-align:middle;
}

.content{
  padding:16px;
  min-width:0;
  height:100%;
  overflow:hidden;
}

.framebox{
  height:100%;
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  box-shadow:0 8px 24px rgba(11,59,120,.06);
  overflow:hidden;
}

iframe{
  display:block;
  width:100%;
  height:100%;
  border:0;
  background:#fff;
}

/* =========================================================
   ELEMENTOS EXCLUSIVOS DO CELULAR
========================================================= */

.mobile-nav,
.mobile-overlay,
.mobile-more-panel{
  display:none;
}

/* =========================================================
   CELULAR
========================================================= */

@media(max-width:900px){

  body{
    height:100dvh;
    overflow:hidden;
    background:#fff;
  }

  /* Cabeçalho menor */

  .topbar{
    height:58px;
    padding:
      env(safe-area-inset-top)
      12px
      0;
    min-height:58px;
  }

  .brand{
    gap:8px;
  }

  .brand img{
    height:29px;
  }

  /* No celular aparece apenas o logo */
  .brand span{
    display:none;
  }

  .userbox{
    gap:8px;
    flex:1;
    margin-left:12px;
  }

  #usuarioTopo{
    max-width:48vw;
    font-size:12px;
    font-weight:700;
    text-align:right;
  }

  .btnSair{
    padding:8px 11px;
    border-radius:9px;
    font-size:12px;
  }

  /* Remove completamente o menu lateral */

  .shell{
    display:block;
    height:calc(100dvh - 58px - 70px);
  }

  .sidebar{
    display:none;
  }

  /* Conteúdo começa imediatamente */

  .content{
    width:100%;
    height:100%;
    padding:6px;
    overflow:hidden;
  }

  .framebox{
    height:100%;
    border-radius:12px;
    box-shadow:none;
    border-color:#edf0f4;
  }

  /* Barra inferior */

  .mobile-nav{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    z-index:50;
    height:calc(70px + env(safe-area-inset-bottom));
    padding:6px 4px env(safe-area-inset-bottom);
    background:#fff;
    border-top:1px solid var(--line);
    box-shadow:0 -5px 18px rgba(15,23,42,.08);
  }

  .mobile-nav button{
    position:relative;
    border:0;
    background:transparent;
    color:#64748b;
    border-radius:12px;
    padding:5px 2px;
    min-width:0;
    cursor:pointer;
    font-family:inherit;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;
  }

  .mobile-nav button:active{
    background:var(--soft);
  }

  .mobile-nav button.active{
    color:var(--primary);
    background:var(--soft);
  }

  .mobile-nav .navIcon{
    display:flex;
    align-items:center;
    justify-content:center;
    width:23px;
    height:23px;
  }

  .mobile-nav .navIcon svg{
    width:22px;
    height:22px;
    fill:none;
    stroke:currentColor;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .mobile-nav .navLabel{
    max-width:100%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font-size:10px;
    line-height:1;
    font-weight:750;
  }

  .mobileNewBadge{
    position:absolute;
    top:2px;
    right:8px;
    min-width:7px;
    height:7px;
    border-radius:999px;
    background:#16a34a;
  }

  /* Fundo escuro do menu Mais */

  .mobile-overlay{
    position:fixed;
    inset:0;
    display:block;
    z-index:55;
    background:rgba(15,23,42,.38);
    opacity:0;
    visibility:hidden;
    transition:
      opacity .2s ease,
      visibility .2s ease;
  }

  .mobile-overlay.open{
    opacity:1;
    visibility:visible;
  }

  /* Painel que sobe ao tocar em Mais */

  .mobile-more-panel{
    display:block;
    position:fixed;
    left:10px;
    right:10px;
    bottom:calc(76px + env(safe-area-inset-bottom));
    z-index:60;
    background:#fff;
    border:1px solid var(--line);
    border-radius:18px;
    padding:8px;
    box-shadow:0 18px 48px rgba(15,23,42,.24);
    opacity:0;
    visibility:hidden;
    transform:translateY(20px);
    transition:
      opacity .2s ease,
      transform .2s ease,
      visibility .2s ease;
  }

  .mobile-more-panel.open{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
  }

  .mobile-more-title{
    padding:7px 10px 9px;
    color:var(--muted);
    font-size:12px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.04em;
  }

  .mobile-more-panel button{
    width:100%;
    border:0;
    background:#fff;
    color:#12345b;
    border-radius:12px;
    padding:13px 12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:12px;
    font-family:inherit;
    text-align:left;
  }

  .mobile-more-panel button + button{
    margin-top:4px;
  }

  .mobile-more-panel button.active,
  .mobile-more-panel button:active{
    background:var(--soft);
    color:var(--primary);
  }

  .moreIcon{
    display:flex;
    align-items:center;
    justify-content:center;
    width:38px;
    height:38px;
    flex-shrink:0;
    border-radius:11px;
    background:var(--soft);
    color:var(--primary);
  }

  .moreIcon svg{
    width:21px;
    height:21px;
    fill:none;
    stroke:currentColor;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .moreText{
    min-width:0;
  }

  .moreText strong{
    display:block;
    font-size:14px;
  }

  .moreText small{
    display:block;
    margin-top:2px;
    color:var(--muted);
    font-size:11px;
  }
}
</style>
</head>

<body>

<header class="topbar">
  <div class="brand">
    <img src="logo-mini.png" alt="Curso Objetivo">
    <span>Portal dos Convidados</span>
  </div>

  <div class="userbox">
    <span id="usuarioTopo">Carregando...</span>
    <button class="btnSair" type="button" onclick="sair()">Sair</button>
  </div>
</header>

<div class="shell">

  <!-- Menu normal do computador -->
  <aside class="sidebar">
    <div class="welcome">
      <b id="nomeUsuario">Bem-vindo(a)</b>
      <small id="dadosUsuario">
        Curso Objetivo – Eventos e Coberturas
      </small>
    </div>

    <nav class="menu">

      <button
        type="button"
        class="active"
        data-page="portal_inicio.html"
        onclick="abrirPagina(this)"
      >
        Início
        <span>Resumo do portal</span>
      </button>

      <button
        type="button"
        data-page="meus_eventos.html"
        onclick="abrirPagina(this)"
      >
        Meus Eventos
        <span>
          Agenda, entrada e saída
          <span class="novoBadge">NOVO</span>
        </span>
      </button>

      <button
        type="button"
        data-page="historico_pagamentos.html"
        onclick="abrirPagina(this)"
      >
        Histórico de Pagamentos
        <span>Eventos, funções e valores</span>
      </button>

      <button
        type="button"
        data-page="recibos.html"
        onclick="abrirPagina(this)"
      >
        Recibos
        <span>Pagamentos fora do holerite</span>
      </button>

      <button
        type="button"
        data-page="informe_rendimentos.html"
        onclick="abrirPagina(this)"
      >
        Informe de Rendimentos
        <span>Disponível em breve</span>
      </button>

      <button
        type="button"
        data-page="meus_dados.html"
        onclick="abrirPagina(this)"
      >
        Meus Dados
        <span>Conferência cadastral</span>
      </button>

    </nav>
  </aside>

  <main class="content">
    <div class="framebox">
      <iframe
        id="frame"
        src="portal_inicio.html"
        title="Conteúdo do portal"
      ></iframe>
    </div>
  </main>

</div>

<!-- Fundo escuro do menu Mais -->
<div
  id="mobileOverlay"
  class="mobile-overlay"
  onclick="fecharMenuMobile()"
></div>

<!-- Menu complementar do celular -->
<div
  id="mobileMorePanel"
  class="mobile-more-panel"
  role="dialog"
  aria-label="Mais opções"
  aria-hidden="true"
>
  <div class="mobile-more-title">Mais opções</div>

  <button
    type="button"
    data-page="informe_rendimentos.html"
    onclick="abrirPagina(this)"
  >
    <span class="moreIcon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <path d="M14 2v6h6"/>
        <path d="M8 13h8"/>
        <path d="M8 17h8"/>
      </svg>
    </span>

    <span class="moreText">
      <strong>Informe de Rendimentos</strong>
      <small>Disponível em breve</small>
    </span>
  </button>

  <button
    type="button"
    data-page="meus_dados.html"
    onclick="abrirPagina(this)"
  >
    <span class="moreIcon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 22a8 8 0 0 1 16 0"/>
      </svg>
    </span>

    <span class="moreText">
      <strong>Meus Dados</strong>
      <small>Conferência cadastral</small>
    </span>
  </button>
</div>

<!-- Navegação inferior exclusiva do celular -->
<nav class="mobile-nav" aria-label="Navegação principal">

  <button
    type="button"
    class="active"
    data-page="portal_inicio.html"
    onclick="abrirPagina(this)"
  >
    <span class="navIcon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 11 12 3l9 8"/>
        <path d="M5 10v10h14V10"/>
        <path d="M9 20v-6h6v6"/>
      </svg>
    </span>
    <span class="navLabel">Início</span>
  </button>

  <button
    type="button"
    data-page="meus_eventos.html"
    onclick="abrirPagina(this)"
  >
    <span class="mobileNewBadge"></span>

    <span class="navIcon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="3" y="5" width="18" height="16" rx="2"/>
        <path d="M16 3v4"/>
        <path d="M8 3v4"/>
        <path d="M3 10h18"/>
      </svg>
    </span>
    <span class="navLabel">Eventos</span>
  </button>

  <button
    type="button"
    data-page="historico_pagamentos.html"
    onclick="abrirPagina(this)"
  >
    <span class="navIcon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <path d="M2 10h20"/>
        <path d="M6 15h4"/>
      </svg>
    </span>
    <span class="navLabel">Pagamentos</span>
  </button>

  <button
    type="button"
    data-page="recibos.html"
    onclick="abrirPagina(this)"
  >
    <span class="navIcon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 2h12v20l-3-2-3 2-3-2-3 2z"/>
        <path d="M9 7h6"/>
        <path d="M9 11h6"/>
        <path d="M9 15h4"/>
      </svg>
    </span>
    <span class="navLabel">Recibos</span>
  </button>

  <button
    id="btnMais"
    type="button"
    onclick="alternarMenuMobile()"
    aria-expanded="false"
    aria-controls="mobileMorePanel"
  >
    <span class="navIcon">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="5" cy="12" r="1"/>
        <circle cx="12" cy="12" r="1"/>
        <circle cx="19" cy="12" r="1"/>
      </svg>
    </span>
    <span class="navLabel">Mais</span>
  </button>

</nav>

<script>
const API_BASE =
  'https://apisec.secauxiliar.com.br/prestadores/';

const paginasDoMenuMais = [
  'informe_rendimentos.html',
  'meus_dados.html'
];

function atualizarMenuAtivo(pagina) {
  document
    .querySelectorAll('[data-page]')
    .forEach((botao) => {
      botao.classList.toggle(
        'active',
        botao.dataset.page === pagina
      );
    });

  const btnMais = document.getElementById('btnMais');

  if (btnMais) {
    btnMais.classList.toggle(
      'active',
      paginasDoMenuMais.includes(pagina)
    );
  }
}

function abrirPagina(btn) {
  const pagina = btn.dataset.page;

  if (!pagina) {
    return;
  }

  atualizarMenuAtivo(pagina);

  const frame = document.getElementById('frame');

  if (frame.getAttribute('src') !== pagina) {
    frame.src = pagina;
  }

  fecharMenuMobile();
}

function alternarMenuMobile() {
  const painel = document.getElementById('mobileMorePanel');
  const overlay = document.getElementById('mobileOverlay');
  const btnMais = document.getElementById('btnMais');

  const aberto = painel.classList.contains('open');

  painel.classList.toggle('open', !aberto);
  overlay.classList.toggle('open', !aberto);

  painel.setAttribute(
    'aria-hidden',
    aberto ? 'true' : 'false'
  );

  btnMais.setAttribute(
    'aria-expanded',
    aberto ? 'false' : 'true'
  );
}

function fecharMenuMobile() {
  const painel = document.getElementById('mobileMorePanel');
  const overlay = document.getElementById('mobileOverlay');
  const btnMais = document.getElementById('btnMais');

  painel.classList.remove('open');
  overlay.classList.remove('open');

  painel.setAttribute('aria-hidden', 'true');
  btnMais.setAttribute('aria-expanded', 'false');
}

async function carregarUsuario() {
  try {
    const r = await fetch(
      API_BASE + 'me.php',
      {
        credentials:'include',
        cache:'no-store'
      }
    );

    const j = await r.json();

    if (!r.ok || !j.ok) {
      location.href = 'index.html';
      return;
    }

    const p = j.prestador || {};

    document.getElementById('usuarioTopo').textContent =
      p.nome || 'Convidado';

    document.getElementById('nomeUsuario').textContent =
      p.nome || 'Bem-vindo(a)';

    const dados = [];

    if (p.funcional) {
      dados.push('Funcional ' + p.funcional);
    }

    if (p.cpf) {
      dados.push('CPF ' + p.cpf);
    }

    if (p.tipo_prestador) {
      dados.push(p.tipo_prestador);
    }

    document.getElementById('dadosUsuario').textContent =
      dados.join(' • ') ||
      'Portal de pagamentos e recibos';

  } catch (e) {
    location.href = 'index.html';
  }
}

async function sair() {
  try {
    await fetch(
      API_BASE + 'logout.php',
      {
        method:'POST',
        credentials:'include'
      }
    );
  } catch (e) {
  }

  location.href = 'index.html';
}

/* Fecha o menu Mais ao pressionar Escape */
document.addEventListener('keydown', (event) => {
  if (event.key === 'Escape') {
    fecharMenuMobile();
  }
});

carregarUsuario();
</script>

</body>
</html>
