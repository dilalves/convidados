<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Meus Eventos</title>

  <style>
    :root {
      --azul: #073f80;
      --fundo: #ffffff;
      --linha: #d9e2ec;
      --texto: #16324f;
      --muted: #64748b;
      --verde: #16794a;
      --vermelho: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #fff;
      color: var(--texto);
    }

    body {
      padding: 16px;
    }

    .card {
      min-height: calc(100vh - 32px);
      background: #fff;
      border: 1px solid var(--linha);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    h1 {
      margin: 0 0 4px;
      color: var(--azul);
      font-size: 26px;
    }

    .sub {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .lista {
      display: grid;
      gap: 12px;
    }

    .evento {
      border: 1px solid var(--linha);
      border-radius: 13px;
      padding: 16px;
    }

    .evento.hoje {
      border: 2px solid #2b78c5;
      background: #f7fbff;
    }

    .linha {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .titulo {
      font-size: 18px;
      font-weight: 800;
      color: #0a3d75;
    }

    .data {
      font-weight: 700;
      margin-top: 5px;
    }

    .detalhes {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 13px;
    }

    .detalhe {
      background: #f7f9fc;
      border-radius: 9px;
      padding: 10px;
    }

    .detalhe span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .b-confirmado {
      background: #dcfce7;
      color: #166534;
    }

    .b-pendente {
      background: #fef3c7;
      color: #92400e;
    }

    .b-recusou {
      background: #fee2e2;
      color: #991b1b;
    }

    .b-cancelado {
      background: #e5e7eb;
      color: #374151;
    }

    .acoes {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 11px 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .entrada {
      background: #15803d;
      color: #fff;
    }

    .saida {
      background: #b42318;
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status-presenca {
      font-weight: 700;
      color: #3f5872;
    }

    .msg {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .erro {
      background: #fee2e2;
      color: #991b1b;
    }

    .ok {
      background: #dcfce7;
      color: #166534;
    }

    .vazio {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }


    .evidencias {
      width: 100%;
      margin-top: 12px;
      border: 1px solid #cfe0f3;
      background: #f8fbff;
      border-radius: 12px;
      padding: 12px;
    }

    .evidencias-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .evidencias-head strong {
      color: var(--azul);
    }

    .contador-fotos {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    .foto-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .foto-form input[type="text"] {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--linha);
      border-radius: 10px;
      padding: 0 11px;
      font-weight: 700;
    }

    .foto-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .btn-foto {
      background: #0b5cab;
      color: #fff;
    }

    .galeria-evidencias {
      display: grid;
      grid-template-columns: repeat(5, minmax(90px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .foto-item {
      position: relative;
      border: 1px solid var(--linha);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      aspect-ratio: 1 / 1;
    }

    .foto-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .foto-excluir {
      position: absolute;
      top: 5px;
      right: 5px;
      border: 0;
      border-radius: 999px;
      width: 28px;
      height: 28px;
      background: rgba(153, 27, 27, .92);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }

    .foto-status {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }


    .cobertura-box {
      width: 100%;
      margin-top: 12px;
      border-top: 1px solid #dbe7f4;
      padding-top: 12px;
    }

    .cobertura-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    .cobertura-head strong {
      color: var(--azul);
    }

    .contador-cobertura {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    .cobertura-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .cobertura-form textarea {
      width: 100%;
      min-height: 78px;
      resize: vertical;
      border: 1px solid var(--linha);
      border-radius: 10px;
      padding: 10px 11px;
      font: inherit;
      font-weight: 700;
      color: var(--texto);
      background: #fff;
    }

    .cobertura-form textarea:focus {
      outline: 2px solid rgba(11, 92, 171, 0.18);
      border-color: #0b5cab;
    }

    .btn-cobertura {
      background: #16794a;
      color: #fff;
      min-width: 145px;
    }

    .cobertura-status {
      margin-top: 7px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    @media (max-width: 800px) {
      body {
        padding: 10px;
      }

      .card {
        min-height: calc(100vh - 20px);
        padding: 14px;
      }

      .detalhes {
        grid-template-columns: 1fr 1fr;
      }

      .linha {
        flex-direction: column;
      }
    }

    @media (max-width: 520px) {
      .detalhes {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }

      .foto-form {
        grid-template-columns: 1fr;
      }

      .cobertura-form {
        grid-template-columns: 1fr;
      }

      .btn-cobertura {
        width: 100%;
      }

      .galeria-evidencias {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>
  <section class="card">
    <h1>Meus Eventos</h1>

    <p class="sub">
      Consulte sua agenda e acompanhe as orientações de presença de cada evento.
    </p>

    <div id="mensagem"></div>

    <div id="lista" class="lista">
      <div class="vazio">Carregando eventos...</div>
    </div>
  </section>

  <script>
    const API_BASE = 'https://apisec.secauxiliar.com.br/prestadores';

    const lista = document.getElementById('lista');
    const mensagem = document.getElementById('mensagem');

    function esc(v) {
      return String(v ?? '').replace(
        /[&<>'"]/g,
        (c) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          "'": '&#39;',
          '"': '&quot;'
        })[c]
      );
    }

    function dataBR(v) {
      if (!v) {
        return '-';
      }

      const [a, m, d] = String(v).split('-');

      return `${d}/${m}/${a}`;
    }

    function hora(v) {
      return v ? String(v).slice(0, 5) : '-';
    }

    function dataHora(v) {
      if (!v) {
        return '-';
      }

      const [data, horario = ''] = String(v).split(' ');

      return `${dataBR(data)}, ${horario.slice(0, 5)}`;
    }

    function badge(status) {
      const mapa = {
        CONFIRMADO: 'b-confirmado',
        PENDENTE: 'b-pendente',
        RECUSOU: 'b-recusou',
        CANCELADO: 'b-cancelado'
      };

      return `
        <span class="badge ${mapa[status] || 'b-cancelado'}">
          ${esc(status)}
        </span>
      `;
    }

    function mostrar(texto, tipo = 'ok') {
      mensagem.innerHTML = `
        <div class="msg ${tipo}">
          ${esc(texto)}
        </div>
      `;

      setTimeout(() => {
        mensagem.innerHTML = '';
      }, 5000);
    }

    async function api(arquivo, opcoes = {}) {
      const r = await fetch(
        `${API_BASE}/${arquivo}`,
        {
          credentials: 'include',
          cache: 'no-store',
          ...opcoes
        }
      );

      const d = await r
        .json()
        .catch(() => ({
          ok: false,
          error: 'Resposta inválida do servidor.'
        }));

      if (r.status === 401) {
        window.top.location.href = 'index.html';
        throw new Error('Sessão expirada.');
      }

      return d;
    }

    function render(eventos) {
      if (!eventos.length) {
        lista.innerHTML = `
          <div class="vazio">
            Nenhum evento encontrado para o seu cadastro.
          </div>
        `;

        return;
      }

      lista.innerHTML = eventos
        .map((e) => {
          const temPosto = String(e.posto ?? '').trim() !== '';

          let acao = '';

          if (
            temPosto
            && e.pode_registrar
            && e.presenca_status === 'NAO_INICIADA'
          ) {
            acao = `
              <button
                class="btn entrada"
                onclick="registrar(${e.evento_id}, 'ENTRADA', this)"
              >
                Registrar entrada
              </button>
            `;
          } else if (
            temPosto
            && e.pode_registrar
            && e.presenca_status === 'EM_ANDAMENTO'
          ) {
            acao = `
              <button
                class="btn saida"
                onclick="registrar(${e.evento_id}, 'SAIDA', this)"
              >
                Registrar saída
              </button>
            `;
          }

          let presenca = temPosto
            ? 'Presença ainda não iniciada.'
            : 'A presença deste evento será registrada na lista da unidade.';

          if (e.presenca_status === 'EM_ANDAMENTO') {
            presenca = `
              Entrada registrada em ${dataHora(e.entrada_em)}.
            `;
          }

          if (e.presenca_status === 'CONCLUIDA') {
            presenca = `
              Concluído: entrada ${dataHora(e.entrada_em)}
              · saída ${dataHora(e.saida_em)}.
            `;
          }

          if (
            temPosto
            && !e.eh_hoje
            && e.presenca_status === 'NAO_INICIADA'
          ) {
            presenca = `
              Registro disponível somente em
              ${dataBR(e.data_evento)}.
            `;
          }

          const statusExibido =
            e.evento_status === 'CANCELADO'
              ? 'CANCELADO'
              : e.convocacao_status;

          return `
            <article class="evento ${e.eh_hoje ? 'hoje' : ''}">
              <div class="linha">
                <div>
                  <div class="titulo">
                    ${esc(e.titulo)}
                  </div>

                  <div class="data">
                    ${dataBR(e.data_evento)}
                    · ${hora(e.hora_inicio)}
                    às ${hora(e.hora_fim)}
                  </div>
                </div>

                ${badge(statusExibido)}
              </div>

              <div class="detalhes">
                <div class="detalhe">
                  <span>Posto</span>
                  <strong>${esc(e.posto || '-')}</strong>
                </div>

                <div class="detalhe">
                  <span>Unidade</span>
                  <strong>${esc(e.cod_unidade || '-')}</strong>
                </div>
              </div>

              <div class="acoes">
                <span class="status-presenca">
                  ${presenca.trim()}
                </span>

                ${acao}
              </div>

              ${
                temPosto && e.presenca_status === 'EM_ANDAMENTO'
                  ? `
                    <section class="evidencias" id="evidencias-${e.evento_id}">
                      <div class="evidencias-head">
                        <strong>📷 Evidências da cobertura</strong>
                        <span class="contador-fotos" id="contador-${e.evento_id}">
                          Carregando...
                        </span>
                      </div>

                      <div class="foto-form">
                        <input
                          id="legenda-${e.evento_id}"
                          type="text"
                          maxlength="180"
                          placeholder="Legenda opcional: portaria, fluxo, cartazes..."
                        >

                        <div>
                          <input
                            class="foto-input"
                            id="foto-${e.evento_id}"
                            type="file"
                            accept="image/*"
                            capture="environment"
                            onchange="enviarFoto(${e.evento_id}, this)"
                          >

                          <button
                            type="button"
                            class="btn btn-foto"
                            onclick="document.getElementById('foto-${e.evento_id}').click()"
                          >
                            Tirar ou escolher foto
                          </button>
                        </div>
                      </div>

                      <div
                        class="galeria-evidencias"
                        id="galeria-${e.evento_id}"
                      ></div>

                      <div class="foto-status" id="foto-status-${e.evento_id}">
                        Envie até 5 imagens durante a cobertura.
                      </div>

                      <div class="cobertura-box">
                        <div class="cobertura-head">
                          <strong>Concorrentes observados</strong>

                          <span
                            class="contador-cobertura"
                            id="contador-cobertura-${e.evento_id}"
                          >
                            ${String(e.cobertura ?? '').length}/200
                          </span>
                        </div>

                        <div class="cobertura-form">
                          <textarea
                            id="cobertura-${e.evento_id}"
                            maxlength="200"
                            placeholder="Ex.: UNIP, ANGLO, POLIEDRO, ETAPA..."
                            oninput="atualizarContadorCobertura(${e.evento_id})"
                          >${esc(e.cobertura || '')}</textarea>

                          <button
                            type="button"
                            class="btn btn-cobertura"
                            onclick="salvarCobertura(${e.evento_id}, this)"
                          >
                            Salvar cobertura
                          </button>
                        </div>

                        <div
                          class="cobertura-status"
                          id="cobertura-status-${e.evento_id}"
                        >
                          Informe ou acrescente os concorrentes identificados neste posto.
                        </div>
                      </div>
                    </section>
                  `
                  : ''
              }
            </article>
          `;
        })
        .join('');

      eventos.forEach((e) => {
        const temPosto = String(e.posto ?? '').trim() !== '';

        if (temPosto && e.presenca_status === 'EM_ANDAMENTO') {
          carregarEvidencias(e.evento_id);
        }
      });
    }


    async function apiForm(arquivo, formData) {
      const r = await fetch(
        `${API_BASE}/${arquivo}`,
        {
          method: 'POST',
          credentials: 'include',
          cache: 'no-store',
          body: formData
        }
      );

      const d = await r.json().catch(() => ({
        ok: false,
        error: 'Resposta inválida do servidor.'
      }));

      if (r.status === 401) {
        window.top.location.href = 'index.html';
        throw new Error('Sessão expirada.');
      }

      return d;
    }

    function canvasParaBlob(canvas, qualidade) {
      return new Promise((resolve) => {
        canvas.toBlob(resolve, 'image/webp', qualidade);
      });
    }

    function comprimirImagem(arquivo) {
      return new Promise((resolve, reject) => {
        const imagem = new Image();
        const url = URL.createObjectURL(arquivo);

        imagem.onload = async () => {
          try {
            const limiteBytes = 1572864; // 1,5 MB
            const menorLadoPermitido = 900;
            let maiorLado = 1600;
            let qualidade = 0.80;
            let blobFinal = null;

            while (maiorLado >= menorLadoPermitido) {
              let largura = imagem.naturalWidth;
              let altura = imagem.naturalHeight;

              if (largura > maiorLado || altura > maiorLado) {
                const escala = Math.min(
                  maiorLado / largura,
                  maiorLado / altura
                );

                largura = Math.max(1, Math.round(largura * escala));
                altura = Math.max(1, Math.round(altura * escala));
              }

              const canvas = document.createElement('canvas');
              canvas.width = largura;
              canvas.height = altura;

              const ctx = canvas.getContext('2d', { alpha: false });

              if (!ctx) {
                throw new Error('Não foi possível preparar a imagem.');
              }

              ctx.fillStyle = '#ffffff';
              ctx.fillRect(0, 0, largura, altura);
              ctx.drawImage(imagem, 0, 0, largura, altura);

              qualidade = 0.80;

              while (qualidade >= 0.42) {
                const blob = await canvasParaBlob(canvas, qualidade);

                if (!blob) {
                  throw new Error('Não foi possível comprimir a foto.');
                }

                blobFinal = blob;

                if (blob.size <= limiteBytes) {
                  resolve(blob);
                  return;
                }

                qualidade -= 0.08;
              }

              maiorLado -= 200;
            }

            if (blobFinal) {
              resolve(blobFinal);
              return;
            }

            throw new Error('Não foi possível preparar esta foto.');
          } catch (e) {
            reject(e);
          } finally {
            URL.revokeObjectURL(url);
          }
        };

        imagem.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('Não foi possível abrir a foto.'));
        };

        imagem.src = url;
      });
    }

    async function carregarEvidencias(eventoId) {
      const contador = document.getElementById(`contador-${eventoId}`);
      const galeria = document.getElementById(`galeria-${eventoId}`);

      if (!contador || !galeria) {
        return;
      }

      try {
        const d = await api(`listar_evidencias.php?evento_id=${eventoId}`);

        if (!d.ok) {
          throw new Error(d.error || 'Erro ao listar fotos.');
        }

        const fotos = d.fotos || [];
        contador.textContent = `${fotos.length} de ${d.limite || 5} fotos`;

        galeria.innerHTML = fotos.map((foto) => `
          <div class="foto-item">
            <img
              src="${esc(foto.url)}"
              alt="${esc(foto.legenda || 'Evidência da cobertura')}"
              loading="lazy"
            >
            <button
              type="button"
              class="foto-excluir"
              title="Excluir foto"
              onclick="excluirFoto(${foto.id}, ${eventoId})"
            >×</button>
          </div>
        `).join('');
      } catch (e) {
        contador.textContent = 'Erro ao carregar';
      }
    }

    async function enviarFoto(eventoId, input) {
      const arquivo = input.files?.[0];

      if (!arquivo) {
        return;
      }

      const status = document.getElementById(`foto-status-${eventoId}`);
      const legenda = document.getElementById(`legenda-${eventoId}`);

      input.disabled = true;
      status.textContent = 'Comprimindo a imagem...';

      try {
        const blob = await comprimirImagem(arquivo);
        status.textContent = 'Obtendo localização...';

        const pos = await obterLocalizacao();

        const form = new FormData();
        form.append('evento_id', String(eventoId));
        form.append('legenda', legenda?.value?.trim() || '');
        form.append('latitude', String(pos.coords.latitude));
        form.append('longitude', String(pos.coords.longitude));
        form.append('precisao', String(pos.coords.accuracy));
        form.append(
          'foto',
          new File([blob], `cobertura-${Date.now()}.webp`, {
            type: 'image/webp'
          })
        );

        status.textContent = 'Enviando para o servidor...';

        const d = await apiForm('upload_evidencia.php', form);

        if (!d.ok) {
          throw new Error(d.error || 'Não foi possível enviar a foto.');
        }

        if (legenda) {
          legenda.value = '';
        }

        mostrar(d.message || 'Foto enviada.');
        await carregarEvidencias(eventoId);
        status.textContent = 'Foto enviada com sucesso.';
      } catch (e) {
        mostrar(e.message, 'erro');
        status.textContent = e.message;
      } finally {
        input.value = '';
        input.disabled = false;
      }
    }

    async function excluirFoto(id, eventoId) {
      if (!confirm('Excluir esta foto?')) {
        return;
      }

      try {
        const d = await api('excluir_evidencia.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ id })
        });

        if (!d.ok) {
          throw new Error(d.error || 'Não foi possível excluir.');
        }

        mostrar(d.message || 'Foto excluída.');
        await carregarEvidencias(eventoId);
      } catch (e) {
        mostrar(e.message, 'erro');
      }
    }


    function atualizarContadorCobertura(eventoId) {
      const campo = document.getElementById(`cobertura-${eventoId}`);
      const contador = document.getElementById(
        `contador-cobertura-${eventoId}`
      );

      if (!campo || !contador) {
        return;
      }

      contador.textContent = `${campo.value.length}/200`;
    }

    async function salvarCobertura(eventoId, botao) {
      const campo = document.getElementById(`cobertura-${eventoId}`);
      const status = document.getElementById(
        `cobertura-status-${eventoId}`
      );

      if (!campo || !botao || !status) {
        return;
      }

      const cobertura = campo.value.trim();

      botao.disabled = true;
      botao.textContent = 'Salvando...';
      status.textContent = 'Enviando informações...';

      try {
        const d = await api('salvar_cobertura.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            evento_id: eventoId,
            cobertura
          })
        });

        if (!d.ok) {
          throw new Error(
            d.error || 'Não foi possível salvar a cobertura.'
          );
        }

        campo.value = d.cobertura ?? cobertura;
        atualizarContadorCobertura(eventoId);

        status.textContent =
          d.message || 'Cobertura salva com sucesso.';

        mostrar(
          d.message || 'Cobertura salva com sucesso.'
        );
      } catch (e) {
        status.textContent = e.message;
        mostrar(e.message, 'erro');
      } finally {
        botao.disabled = false;
        botao.textContent = 'Salvar cobertura';
      }
    }

    async function carregar() {
      try {
        const d = await api('meus_eventos.php');

        if (!d.ok) {
          throw new Error(
            d.error || 'Erro ao carregar.'
          );
        }

        render(d.eventos || []);

      } catch (e) {
        lista.innerHTML = `
          <div class="msg erro">
            ${esc(e.message)}
          </div>
        `;
      }
    }

    function obterLocalizacao() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(
            new Error(
              'Este aparelho não oferece localização pelo navegador.'
            )
          );

          return;
        }

        navigator.geolocation.getCurrentPosition(
          resolve,
          (err) => {
            const msgs = {
              1: 'Autorize o uso da localização para registrar a presença.',
              2: 'Não foi possível obter sua localização.',
              3: 'A localização demorou para responder. Tente novamente.'
            };

            reject(
              new Error(
                msgs[err.code]
                || 'Erro ao acessar a localização.'
              )
            );
          },
          {
            enableHighAccuracy: true,
            timeout: 20000,
            maximumAge: 0
          }
        );
      });
    }

    async function registrar(eventoId, acao, botao) {
      if (!botao) {
        return;
      }

      const texto =
        acao === 'ENTRADA'
          ? 'entrada'
          : 'saída';

      if (
        !confirm(
          `Confirmar o registro de ${texto} usando a localização atual do celular?`
        )
      ) {
        return;
      }

      botao.disabled = true;
      botao.textContent = 'Obtendo GPS...';

      try {
        const pos = await obterLocalizacao();

        botao.textContent = 'Registrando...';

        const d = await api(
          'registrar_presenca.php',
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              evento_id: eventoId,
              acao,
              latitude: pos.coords.latitude,
              longitude: pos.coords.longitude,
              precisao: pos.coords.accuracy
            })
          }
        );

        if (!d.ok) {
          throw new Error(
            d.error || 'Não foi possível registrar.'
          );
        }

        mostrar(
          d.message || 'Registro realizado.'
        );

        await carregar();

      } catch (e) {
        mostrar(e.message, 'erro');

        botao.disabled = false;

        botao.textContent =
          acao === 'ENTRADA'
            ? 'Registrar entrada'
            : 'Registrar saída';
      }
    }

    carregar();
  </script>
</body>
</html>
