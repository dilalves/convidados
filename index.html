<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/x-icon" href="https://www.curso-objetivo.br/assets/img/favicon.ico">
<title>Portal dos Convidados — Curso Objetivo</title>

<style>
:root{
  --bg:#f7f8fb;
  --card:#ffffff;
  --line:#e5e7eb;
  --ink:#0f172a;
  --muted:#6b7280;
  --primary:#0b3b78;
  --accent:#2563eb;
  --danger:#b91c1c;
  --success:#166534;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,Arial,sans-serif;
  background:var(--bg);
  color:var(--ink);
}
header.topbar{
  height:68px;
  background:var(--primary);
  color:#fff;
  display:flex;
  align-items:center;
  padding:0 24px;
  box-shadow:0 2px 10px rgba(16,24,40,.16);
}
header.topbar img{
  height:32px;
  margin-right:14px;
}
header.topbar h1{
  font-size:18px;
  margin:0;
  font-weight:650;
}
main{
  min-height:calc(100vh - 68px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px 16px;
}
.card{
  width:100%;
  max-width:460px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:26px;
  box-shadow:0 12px 34px rgba(15,23,42,.08);
}
.card h2{
  margin:0 0 8px;
  font-size:24px;
  color:var(--primary);
}
.card p{
  margin:0 0 22px;
  color:var(--muted);
  line-height:1.45;
}
label{
  display:block;
  font-size:14px;
  font-weight:600;
  margin:14px 0 6px;
}
input{
  width:100%;
  padding:12px 13px;
  border-radius:10px;
  border:1px solid #d1d5db;
  font-size:15px;
}
button{
  width:100%;
  margin-top:18px;
  padding:13px 16px;
  border:0;
  border-radius:10px;
  background:var(--accent);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}
button:hover{filter:brightness(1.05)}
button:disabled{opacity:.65;cursor:default}
.hidden{display:none!important}
.msg{
  margin-top:14px;
  padding:12px;
  border-radius:10px;
  background:#eef2ff;
  color:#1e3a8a;
  font-size:14px;
}
.msg.erro{
  background:#fee2e2;
  color:var(--danger);
}
.msg.ok{
  background:#dcfce7;
  color:var(--success);
}
.small{
  margin-top:18px;
  font-size:13px;
  color:var(--muted);
  text-align:center;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.55);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:99;
}
.modalBox{
  width:100%;
  max-width:500px;
  background:#fff;
  border-radius:16px;
  padding:24px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.modalBox h3{
  margin:0 0 6px;
  color:var(--primary);
  font-size:22px;
}
.modalBox p{
  margin:0 0 14px;
  color:var(--muted);
  line-height:1.4;
}
.btnSec{
  background:#e5e7eb;
  color:#111827;
}
</style>
</head>

<body>
<header class="topbar">
  <img src="logo-mini.png" alt="Curso Objetivo">
  <h1>Portal dos Convidados</h1>
</header>

<main>
  <section class="card">
    <h2>Acesso ao Portal</h2>
    <p>
      Área exclusiva para convidados e prestadores que participaram de eventos avulsos do Curso Objetivo.
    </p>

    <div id="etapaCpf">
      <label for="cpf">CPF</label>
      <input id="cpf" placeholder="Digite seu CPF" inputmode="numeric" autocomplete="username">
      <button id="btnCpf">Continuar</button>
    </div>

    <div id="etapaSenha" class="hidden">
      <label for="senhaLogin">Senha</label>
      <input id="senhaLogin" type="password" placeholder="Digite sua senha" autocomplete="current-password">
      <button id="btnLogin">Entrar</button>
    </div>

    <div id="etapaFuncional" class="hidden">
      <label for="empresa">Empresa / unidade</label>
      <input id="empresa" placeholder="Ex.: 1501" inputmode="numeric">

      <label for="funcional">Funcional</label>
      <input id="funcional" placeholder="Digite seu funcional" inputmode="numeric">

      <button id="btnFuncional">Localizar cadastro</button>
    </div>

    <div id="retorno" class="msg hidden"></div>

    <div class="small">
      Primeiro acesso? Informe seu CPF para localizar seu cadastro.
    </div>
  </section>
</main>

<div id="modalCadastro" class="modal hidden">
  <div class="modalBox">
    <h3 id="modalTitulo">Criar senha</h3>
    <p id="modalTexto">Confirme seus dados e crie uma senha de acesso.</p>

    <input type="hidden" id="prestador_id">

    <label for="nomeModal">Nome</label>
    <input id="nomeModal" disabled>

    <label for="cpfModal">CPF</label>
    <input id="cpfModal" inputmode="numeric" placeholder="Digite seu CPF">

    <label for="emailModal">E-mail</label>
    <input id="emailModal" type="email" placeholder="seuemail@exemplo.com">

    <label for="celularModal">Celular</label>
    <input id="celularModal" inputmode="numeric" placeholder="DDD + número">

    <label for="senhaModal">Senha</label>
    <input id="senhaModal" type="password" placeholder="Mínimo 6 caracteres">

    <label for="confirmaSenhaModal">Confirmar senha</label>
    <input id="confirmaSenhaModal" type="password" placeholder="Digite novamente">

    <button id="btnSalvarCadastro">Salvar e acessar</button>
    <button id="btnFecharModal" type="button" class="btnSec">Cancelar</button>

    <div id="retornoModal" class="msg hidden"></div>
  </div>
</div>

<script>
const API_BASE = 'https://apisec.secauxiliar.com.br/prestadores';

const el = id => document.getElementById(id);
let cpfAtual = '';

function onlyDigits(v){
  return String(v || '').replace(/\D+/g, '');
}

function mostrar(texto, tipo='info'){
  const box = el('retorno');
  box.className = 'msg';
  if (tipo === 'erro') box.classList.add('erro');
  if (tipo === 'ok') box.classList.add('ok');
  box.textContent = texto;
  box.classList.remove('hidden');
}

function mostrarModal(texto, tipo='info'){
  const box = el('retornoModal');
  box.className = 'msg';
  if (tipo === 'erro') box.classList.add('erro');
  if (tipo === 'ok') box.classList.add('ok');
  box.textContent = texto;
  box.classList.remove('hidden');
}

function limparMsg(){
  el('retorno').classList.add('hidden');
  el('retornoModal').classList.add('hidden');
}

async function postJSON(endpoint, payload){
  const r = await fetch(`${API_BASE}/${endpoint}`, {
    method:'POST',
    credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });

  const data = await r.json();
  return {r, data};
}

function abrirModalCadastro(data, modo){
  limparMsg();

  el('prestador_id').value = data.prestador_id || '';
  el('nomeModal').value = data.nome || '';
  el('cpfModal').value = data.cpf || cpfAtual || '';
  el('emailModal').value = data.email || '';
  el('celularModal').value = onlyDigits(data.celular || '');
  el('senhaModal').value = '';
  el('confirmaSenhaModal').value = '';

  if (modo === 'COMPLETAR_CADASTRO') {
    el('modalTitulo').textContent = 'Completar cadastro';
    el('modalTexto').textContent = 'Localizamos seu cadastro antigo. Confirme seus dados e crie sua senha.';
  } else {
    el('modalTitulo').textContent = 'Criar senha';
    el('modalTexto').textContent = 'Cadastro localizado. Confirme seus dados e crie sua senha de acesso.';
  }

  el('modalCadastro').classList.remove('hidden');
  setTimeout(() => el('emailModal').focus(), 100);
}

function fecharModal(){
  el('modalCadastro').classList.add('hidden');
}

async function verificarCpf(){
  const cpf = onlyDigits(el('cpf').value);
  cpfAtual = cpf;

  el('etapaSenha').classList.add('hidden');
  el('etapaFuncional').classList.add('hidden');

  if (!cpf) {
    mostrar('Informe seu CPF.', 'erro');
    return;
  }

  if (cpf.length !== 11) {
    mostrar('Informe um CPF válido com 11 números.', 'erro');
    return;
  }

  el('btnCpf').disabled = true;

  try {
    const {data} = await postJSON('verificar_acesso.php', {cpf});

    if (data.status === 'CRIAR_SENHA') {
      abrirModalCadastro(data, 'CRIAR_SENHA');
      return;
    }

    if (data.status === 'LOGIN') {
      mostrar(data.message || 'CPF encontrado. Informe sua senha.', 'ok');
      el('etapaSenha').classList.remove('hidden');
      setTimeout(() => el('senhaLogin').focus(), 100);
      return;
    }

    if (data.status === 'PEDIR_EMPRESA_FUNCIONAL') {
      mostrar(data.message || 'CPF não encontrado. Informe empresa/unidade e funcional para localizar seu cadastro antigo.');
      el('etapaFuncional').classList.remove('hidden');
      setTimeout(() => el('empresa').focus(), 100);
      return;
    }

    mostrar(data.message || data.error || 'Não foi possível verificar o CPF.', 'erro');

  } catch (e) {
    console.error(e);
    mostrar('Erro de rede ou servidor indisponível.', 'erro');
  } finally {
    el('btnCpf').disabled = false;
  }
}

async function fazerLogin(){
  const cpf = cpfAtual || onlyDigits(el('cpf').value);
  const senha = el('senhaLogin').value;

  if (!cpf || cpf.length !== 11) {
    mostrar('Informe um CPF válido.', 'erro');
    return;
  }

  if (!senha) {
    mostrar('Informe sua senha.', 'erro');
    return;
  }

  el('btnLogin').disabled = true;

  try {
    const {data} = await postJSON('login.php', {cpf, senha});

    if (!data.ok) {
      mostrar(data.error || data.message || 'Não foi possível entrar.', 'erro');
      return;
    }

    mostrar('Login realizado com sucesso. Redirecionando...', 'ok');
    window.location.href = 'painel.html';

  } catch (e) {
    console.error(e);
    mostrar('Erro de rede ou servidor indisponível.', 'erro');
  } finally {
    el('btnLogin').disabled = false;
  }
}

async function localizarFuncional(){
  const empresa = onlyDigits(el('empresa').value);
  const funcional = onlyDigits(el('funcional').value);

  if (!empresa || !funcional) {
    mostrar('Informe empresa/unidade e funcional.', 'erro');
    return;
  }

  el('btnFuncional').disabled = true;

  try {
    const {data} = await postJSON('verificar_acesso.php', {empresa, funcional});

    if (data.status === 'COMPLETAR_CADASTRO') {
      abrirModalCadastro(data, 'COMPLETAR_CADASTRO');
      return;
    }

    mostrar(data.message || data.error || 'Cadastro não encontrado.', 'erro');

  } catch (e) {
    console.error(e);
    mostrar('Erro de rede ou servidor indisponível.', 'erro');
  } finally {
    el('btnFuncional').disabled = false;
  }
}

async function salvarCadastro(){
  const payload = {
    prestador_id: Number(el('prestador_id').value || 0),
    cpf: onlyDigits(el('cpfModal').value),
    email: el('emailModal').value.trim(),
    celular: onlyDigits(el('celularModal').value),
    senha: el('senhaModal').value,
    confirma_senha: el('confirmaSenhaModal').value
  };

  if (!payload.prestador_id) {
    mostrarModal('Prestador inválido.', 'erro');
    return;
  }

  if (!payload.cpf || payload.cpf.length !== 11) {
    mostrarModal('Informe um CPF válido.', 'erro');
    return;
  }

  if (!payload.email) {
    mostrarModal('Informe um e-mail válido.', 'erro');
    return;
  }

  if (!payload.celular || payload.celular.length < 10) {
    mostrarModal('Informe um celular válido com DDD.', 'erro');
    return;
  }

  if (!payload.senha || payload.senha.length < 6) {
    mostrarModal('A senha deve ter pelo menos 6 caracteres.', 'erro');
    return;
  }

  if (payload.senha !== payload.confirma_senha) {
    mostrarModal('As senhas não conferem.', 'erro');
    return;
  }

  el('btnSalvarCadastro').disabled = true;

  try {
    const {data} = await postJSON('salvar_senha.php', payload);

    if (!data.ok) {
      mostrarModal(data.error || data.message || 'Não foi possível salvar.', 'erro');
      return;
    }

    mostrarModal('Cadastro salvo com sucesso. Redirecionando...', 'ok');
    window.location.href = 'painel.html';

  } catch (e) {
    console.error(e);
    mostrarModal('Erro de rede ou servidor indisponível.', 'erro');
  } finally {
    el('btnSalvarCadastro').disabled = false;
  }
}

el('btnCpf').onclick = verificarCpf;
el('btnLogin').onclick = fazerLogin;
el('btnFuncional').onclick = localizarFuncional;
el('btnSalvarCadastro').onclick = salvarCadastro;
el('btnFecharModal').onclick = fecharModal;

el('cpf').addEventListener('keydown', e => {
  if (e.key === 'Enter') verificarCpf();
});

el('senhaLogin').addEventListener('keydown', e => {
  if (e.key === 'Enter') fazerLogin();
});

el('funcional').addEventListener('keydown', e => {
  if (e.key === 'Enter') localizarFuncional();
});

el('confirmaSenhaModal').addEventListener('keydown', e => {
  if (e.key === 'Enter') salvarCadastro();
});
</script>
</body>
</html>
